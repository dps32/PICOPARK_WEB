<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>PICOPARK Viewer – En directe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #080f08;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }
        #embed-html {
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
        }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #080f08;
            color: #35ff74;
            font-family: monospace;
            font-size: 1.4rem;
            gap: 16px;
            z-index: 10;
        }
        #loading .spinner {
            width: 48px; height: 48px;
            border: 4px solid #35ff7430;
            border-top-color: #35ff74;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <span>Carregant PICOPARK Viewer...</span>
    </div>
    <div id="embed-html"></div>
    <script src="viewer/viewer.nocache.js"></script>
    <script>
        // Amagar el loading quan el canvas estigui llest
        var observer = new MutationObserver(function() {
            var canvas = document.querySelector('canvas');
            if (canvas) {
                document.getElementById('loading').style.display = 'none';
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
