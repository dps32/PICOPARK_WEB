server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Assets del joc (imatges, JSON dels nivells)
    location /assets/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Fitxers GWT compilats (JS, cache-busted)
    location /viewer/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Qualsevol altra ruta → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
